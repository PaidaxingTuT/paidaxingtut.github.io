<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
    <title> 派大星工作室 - 感谢有你</title>
    <meta name="description" content="一个人的坚持因为有你们才更有力量，感谢每一位支持者！">
    <style>
        :root {
            --bg: #0d0d1a;
            --card-bg: rgba(20, 35, 80, 0.85);
            --text: #e0e0ff;
            --accent: #00f2fe;
            --pink: #ff2af5;
            --gold: #ffd700;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "MiSans", "HarmonyOS Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0,242,254,0.15) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255,42,245,0.15) 0%, transparent 20%),
                url('https://cdn.jsdelivr.net/gh/moezx/cdn@master/img/wallpaper/starry-sky.jpg');
            background-size: cover;
            background-attachment: fixed;
            line-height: 1.7;
            overflow-x: hidden;
        }
        canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.6; }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }
        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--pink), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .lead {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin: 60px 0;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            border: 1px solid rgba(0, 242, 254, 0.2);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            cursor: pointer;
            transform: translateY(0);
        }

        @media (hover: hover) {
            .card:hover {
                transform: scale(1.10) translateY(-10px);
                border-color: rgba(0, 242, 254, 0.8);
                box-shadow: 
                    0 0 50px rgba(0, 242, 254, 0.7),
                    0 0 100px rgba(0, 242, 254, 0.4),
                    0 25px 60px rgba(0,0,0,0.5);
                z-index: 10;
            }
        }

        .card.active {
            transform: translateY(-15px);
            border-color: rgba(0, 242, 254, 0.8);
            box-shadow: 
                0 0 40px rgba(0, 242, 254, 0.6),
                0 20px 50px rgba(0,0,0,0.4);
        }

        .price {
            font-size: 4.2rem;
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .desc {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .qrcode {
            width: 240px;
            height: 240px;
            margin: 25px auto;
            border-radius: 24px;
            overflow: hidden;
            border: 8px solid rgba(0, 242, 254, 0.3);
            transition: all 0.5s ease;
        }
        .card:hover .qrcode,
        .card.active .qrcode {
            border-color: rgba(0, 242, 254, 0.9);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.8);
        }
        .qrcode img { width:100%; height:100%; object-fit:cover; }

        .thanks {
            text-align: center;
            margin: 100px 0 60px;
            font-size: 1.3rem;
            opacity: 0.85;
        }
        .heart {
            color: #ff2a6d;
            font-size: 1.8em;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        footer {
            text-align: center;
            padding: 60px 20px 100px;
            opacity: 0.7;
            font-size: 1rem;
        }

        .nav-back {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(20, 35, 80, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 36px;
            border-radius: 50px;
            border: 1px solid rgba(0, 242, 254, 0.4);
            color: var(--text);
            font-size: 1.1rem;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }
        .nav-back:hover {
            background: rgba(0, 242, 254, 0.25);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.7);
            transform: translateX(-50%) translateY(-5px);
        }
        @media (max-width: 768px) {
            .nav-back { padding: 12px 30px; font-size: 1rem; bottom: 15px; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <header>
        <h1>赞助</h1>
        <p class="lead">感谢您让我的网站活下去！</p>
    </header>

    <div class="cards">
        <div class="card" onclick="toggleActive(this)">
            <h2>QQ 支付</h2>
            <div class="price">感谢</div>
            <p class="desc">感谢您的赞助<br>——派大星</p>
            <div class="qrcode">
                <img src="img/qq.png" alt="QQ支付">
            </div>
            <p><small>QQ扫一扫 • 感谢你的一份心意</small></p>
        </div>

        <div class="card" onclick="toggleActive(this)">
            <h2>微信支付</h2>
            <div class="price">感谢</div>
            <p class="desc">感谢您的赞助<br>——派大星</p>
            <div class="qrcode">
                <img src="img/wechat.png" alt="微信支付">
            </div>
            <p><small>微信扫一扫 • 有你才更美好</small></p>
        </div>

        <div class="card" onclick="toggleActive(this)">
            <h2>支付宝支付</h2>
            <div class="price">感谢</div>
            <p class="desc">感谢您的赞助<br>——派大星</p>
            <div class="qrcode">
                <img src="img/alipay.png" alt="支付宝支付">
            </div>
            <p><small>支付宝扫一扫 • 每一份支持都珍贵</small></p>
        </div>
    </div>

    <div class="thanks">
        <p>感谢您的慷慨解囊，让本站活下去~</p>
    </div>

    <footer>
        <p>© 2025 大星科技</p>
        <p style="margin-top:10px;font-size:0.9rem;opacity:0.6;">
            感谢每一位选择相信和支持的朋友，你们是最亮的星✨
        </p>
    </footer>
</div>

<a href="../" class="nav-back">← 返回首页</a>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
    particlesJS("canvas", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": ["#00f2fe", "#ff2af5", "#ffd700"] },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.6, "random": true },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
            "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out" }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": {
                "onhover": { "enable": true, "mode": "repulse" },
                "onclick": { "enable": true, "mode": "push" },
                "resize": true
            }
        },
        "retina_detect": true
    });

    function toggleActive(card) {
        if (window.innerWidth <= 768) {
            card.classList.toggle('active');
            setTimeout(() => card.classList.remove('active'), 3000);
        }
    }
</script>

</body>
</html>
