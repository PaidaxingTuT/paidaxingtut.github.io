<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>派大星工作室-赞助支持中心</title>
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon" />
    <meta
      name="description"
      content="一个人的坚持因为有你们才更有力量，感谢每一位支持者！"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // 完全复用 check 页面的 Tailwind 配置
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3b82f6",
              secondary: "#06b6d4",
              dark: {
                50: "#f8fafc",
                100: "#f1f5f9",
                200: "#e2e8f0",
                300: "#cbd5e1",
                400: "#94a3b8",
                500: "#64748b",
                600: "#475569",
                700: "#334155",
                800: "#1e293b",
                900: "#0f172a",
                950: "#020617",
              },
            },
            fontFamily: {
              inter: ["Inter", "system-ui", "sans-serif"],
            },
            boxShadow: {
              card: "0 10px 30px -5px rgba(0, 0, 0, 0.1)",
              hover: "0 20px 40px -5px rgba(0, 0, 0, 0.15)",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .bg-gradient-dark {
          background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .bg-gradient-light {
          background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .transition-custom {
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="font-inter bg-gray-50 dark:bg-dark-900 min-h-screen flex flex-col text-gray-800 dark:text-gray-200 transition-custom overflow-x-hidden"
  >
    <header
      class="bg-white dark:bg-dark-800 shadow-sm sticky top-0 z-50 transition-custom border-b border-gray-200 dark:border-dark-700"
    >
      <div
        class="container mx-auto px-4 py-3 flex justify-between items-center"
      >
        <div class="flex items-center space-x-2">
          <h1
            class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white transition-custom"
          >
            赞助支持中心
          </h1>
        </div>

        <button
          id="themeToggle"
          class="p-2 rounded-lg bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-dark-600 transition-custom focus:outline-none shadow-sm"
          title="切换模式"
        >
          ☀️
        </button>
      </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 md:py-16">
      <section class="max-w-5xl mx-auto mb-12">
        <div class="text-center mb-10">
          <h2
            class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-gray-900 dark:text-white mb-2 transition-custom"
          >
            赞助与支持
          </h2>
          <p class="text-gray-500 dark:text-gray-400 transition-custom">
            感谢您让我的网站活下去！
          </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
          <div
            class="bg-white dark:bg-dark-800 rounded-2xl shadow-card p-6 md:p-8 transition-custom hover:shadow-hover border border-gray-200 dark:border-dark-700 flex flex-col items-center text-center group"
          >
            <h2
              class="text-xl font-bold text-gray-900 dark:text-white mb-2 transition-custom"
            >
              QQ 支付
            </h2>
            <div
              class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-2"
            >
              感谢
            </div>
            <p
              class="text-gray-500 dark:text-gray-400 text-sm mb-6 transition-custom"
            >
              感谢您的赞助<br />——派大星
            </p>
            <div
              class="w-48 h-48 rounded-2xl overflow-hidden border-4 border-gray-100 dark:border-dark-700 group-hover:border-primary/50 transition-custom mb-4 bg-white p-2"
            >
              <img
                src="img/qq.png"
                alt="QQ支付"
                class="w-full h-full object-contain"
              />
            </div>
            <p
              class="text-xs text-gray-400 dark:text-gray-500 mt-auto transition-custom"
            >
              QQ扫一扫 • 感谢你的一份心意
            </p>
          </div>

          <div
            class="bg-white dark:bg-dark-800 rounded-2xl shadow-card p-6 md:p-8 transition-custom hover:shadow-hover border border-gray-200 dark:border-dark-700 flex flex-col items-center text-center group"
          >
            <h2
              class="text-xl font-bold text-gray-900 dark:text-white mb-2 transition-custom"
            >
              微信支付
            </h2>
            <div
              class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500 mb-2"
            >
              感谢
            </div>
            <p
              class="text-gray-500 dark:text-gray-400 text-sm mb-6 transition-custom"
            >
              感谢您的赞助<br />——派大星
            </p>
            <div
              class="w-48 h-48 rounded-2xl overflow-hidden border-4 border-gray-100 dark:border-dark-700 group-hover:border-primary/50 transition-custom mb-4 bg-white p-2"
            >
              <img
                src="img/wechat.png"
                alt="微信支付"
                class="w-full h-full object-contain"
              />
            </div>
            <p
              class="text-xs text-gray-400 dark:text-gray-500 mt-auto transition-custom"
            >
              微信扫一扫 • 有你才更美好
            </p>
          </div>

          <div
            class="bg-white dark:bg-dark-800 rounded-2xl shadow-card p-6 md:p-8 transition-custom hover:shadow-hover border border-gray-200 dark:border-dark-700 flex flex-col items-center text-center group"
          >
            <h2
              class="text-xl font-bold text-gray-900 dark:text-white mb-2 transition-custom"
            >
              支付宝支付
            </h2>
            <div
              class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-500 mb-2"
            >
              感谢
            </div>
            <p
              class="text-gray-500 dark:text-gray-400 text-sm mb-6 transition-custom"
            >
              感谢您的赞助<br />——派大星
            </p>
            <div
              class="w-48 h-48 rounded-2xl overflow-hidden border-4 border-gray-100 dark:border-dark-700 group-hover:border-primary/50 transition-custom mb-4 bg-white p-2"
            >
              <img
                src="img/alipay.png"
                alt="支付宝支付"
                class="w-full h-full object-contain"
              />
            </div>
            <p
              class="text-xs text-gray-400 dark:text-gray-500 mt-auto transition-custom"
            >
              支付宝扫一扫 • 每一份支持都珍贵
            </p>
          </div>
        </div>

        <div
          class="text-center mt-12 text-gray-500 dark:text-gray-400 transition-custom"
        >
          <p>感谢您的慷慨解囊，让本站活下去~</p>
        </div>
      </section>
    </main>

    <footer
      class="bg-white dark:bg-dark-800 text-gray-500 dark:text-gray-400 py-8 border-t border-gray-200 dark:border-dark-700 transition-custom mt-auto"
    >
      <div class="container mx-auto px-4">
        <div
          class="flex flex-col md:flex-row justify-between items-center text-sm"
        >
          <div class="mb-4 md:mb-0 text-center md:text-left">
            <p>&copy; 2025 大星科技. 保留所有权利.</p>
            <p class="mt-1 text-xs opacity-75">
              感谢每一位选择相信和支持的朋友，你们是最亮的星✨
            </p>
          </div>
          <div class="flex space-x-6">
            <a
              href="/"
              class="hover:text-gray-900 dark:hover:text-white transition-custom"
              ><span>返回首页</span></a
            >
            <a
              href="/check"
              class="hover:text-gray-900 dark:hover:text-white transition-custom"
              ><span>进度查询</span></a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      const themeToggle = document.getElementById("themeToggle");
      const htmlElement = document.documentElement;

      function updateThemeIcon() {
        if (htmlElement.classList.contains("dark")) {
          themeToggle.textContent = "☀️";
        } else {
          themeToggle.textContent = "🌙";
        }
      }

      updateThemeIcon();

      themeToggle.addEventListener("click", () => {
        htmlElement.classList.toggle("dark");
        updateThemeIcon();
      });
    </script>
  </body>
</html>
