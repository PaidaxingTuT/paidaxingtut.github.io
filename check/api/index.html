<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>派大星工作室-刷课进度查询系统</title>
  <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#06b6d4',
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617'
            }
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'card': '0 10px 30px -5px rgba(0, 0, 0, 0.3)',
            'hover': '0 20px 40px -5px rgba(0, 0, 0, 0.4)',
          }
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .bg-gradient-primary {
        background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      }
      .bg-gradient-dark {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      }
      .text-shadow {
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      }
      .transition-custom {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .input-dark {
        background-color: #0a0f1a !important;
        border-color: #1e293b !important;
        color: #cbd5e1 !important;
        caret-color: #cbd5e1 !important;
      }
      .input-dark:focus {
        background-color: #0a0f1a !important;
        border-color: #3b82f6 !important;
        color: #cbd5e1 !important;
        caret-color: #cbd5e1 !important;
      }
      .input-dark::placeholder {
        color: #64748b !important;
      }
      .input-dark:-webkit-autofill,
      .input-dark:-webkit-autofill:hover, 
      .input-dark:-webkit-autofill:focus,
      .input-dark:-webkit-autofill:active {
        -webkit-text-fill-color: #cbd5e1 !important;
        -webkit-box-shadow: 0 0 0px 1000px #0a0f1a inset !important;
        transition: background-color 5000s ease-in-out 0s;
        caret-color: #cbd5e1 !important;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-inter bg-dark-900 min-h-screen flex flex-col text-gray-200">
  <header class="bg-dark-800 shadow-sm sticky top-0 z-50 transition-custom border-b border-dark-700">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <h1 class="text-xl md:text-2xl font-bold text-white">刷课进度查询系统</h1>
      </div>
      <nav class="hidden md:flex items-center space-x-6">
        <a href="http://www.pdxstudio.site" class="text-gray-300 hover:text-primary transition-custom font-medium">首页</a>
        <a href="#" class="text-primary border-b-2 border-primary pb-1 font-medium">刷课进度查询</a>
      </nav>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-4 py-8 md:py-16">
    <section class="max-w-2xl mx-auto mb-12">
      <div class="bg-dark-800 rounded-2xl shadow-card p-6 md:p-8 transition-custom hover:shadow-hover border border-dark-700">
        <div class="text-center mb-8">
          <h2 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-white mb-2">刷课进度查询</h2>
          <p class="text-gray-400">请输入您的下单账号查询相关进度信息</p>
          <p class="text-gray-400">低价刷课请返回首页添加派大星QQ😊</p>
        </div>
        
        <form id="queryForm" class="space-y-6" action="javascript:void(0)">
          <div class="space-y-2">
            <label for="username" class="block text-sm font-medium text-gray-300">下单账号</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">👤</span>
              <input 
                type="text" 
                id="username" 
                name="username" 
                required
                class="w-full pl-10 pr-3 py-3 input-dark rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-custom"
                placeholder="请输入您的下单账号(平台账号或手机号)"
                style="color: #cbd5e1 !important; caret-color: #cbd5e1 !important;"
              >
            </div>
          </div>
          
          <button 
            type="submit" 
            class="w-full bg-gradient-dark hover:bg-gray-800 text-white font-medium py-3 px-4 rounded-lg transition-custom flex items-center justify-center space-x-2 shadow-lg border border-gray-700 hover:border-gray-600"
          >
            <span>🔍</span>
            <span>查询进度</span>
          </button>
        </form>
      </div>
    </section>
    
    <section id="orderResult" class="max-w-4xl mx-auto hidden">
      <div class="bg-dark-800 rounded-2xl shadow-card p-6 md:p-8 transition-custom border border-dark-700">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-bold text-white">进度查询结果</h3>
          <span id="resultCount" class="text-sm text-gray-400 bg-dark-700 px-3 py-1 rounded-full">0 条进度</span>
        </div>
        
        <div id="orderList" class="space-y-6 max-h-[600px] overflow-y-auto pr-2">
          <div class="text-center text-gray-400 py-12" id="initialState">
            <span class="text-4xl mb-4 text-gray-600 block">🔍</span>
            <p>请输入账号查询进度信息</p>
          </div>
          <div class="text-center text-gray-400 py-12 hidden" id="loadingState">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-primary border-t-transparent mb-4"></div>
            <p>正在为您同步最新进度，请稍候...</p>
          </div>
          <div class="text-center text-gray-400 py-12 hidden" id="emptyState">
            <span class="text-4xl mb-4 text-gray-600 block">📭</span>
            <p>未查询到相关进度信息，请核对账号是否有误或稍后再试</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-dark-800 text-gray-400 py-8 border-t border-dark-700">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="mb-4 md:mb-0">
          <p class="text-sm">&copy; 2025 大星科技. 保留所有权利.</p>
        </div>
        <div class="flex space-x-6">
          <a href="http://www.pdxstudio.site" class="hover:text-white transition-custom"><span>返回首页</span></a>
          <a href="http://www.pdxstudio.site/pay" class="hover:text-white transition-custom"><span>赞助我们</span></a>
        </div>
      </div>
    </div>
  </footer>

  <div id="toast" class="fixed top-4 right-4 bg-dark-800 text-white px-4 py-2 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 flex items-center space-x-2 z-50 border border-dark-700">
    <span id="toastIcon">ℹ️</span>
    <span id="toastMessage">操作提示</span>
  </div>

  <script>
    const API_URL = './api/api.php'; // 确保路径与你的 PHP 文件位置对应
    
    const queryForm = document.getElementById('queryForm');
    const orderResult = document.getElementById('orderResult');
    const orderList = document.getElementById('orderList');
    const initialState = document.getElementById('initialState');
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const resultCount = document.getElementById('resultCount');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIcon = document.getElementById('toastIcon');
    
    orderResult.classList.add('hidden');
    
    queryForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      const username = document.getElementById('username').value.trim();
      
      if (!username) {
        showToast('请填写需要查询的下单账号', 'warning');
        return;
      }
      
      orderResult.classList.remove('hidden');
      initialState.classList.add('hidden');
      loadingState.classList.remove('hidden');
      emptyState.classList.add('hidden');
      orderList.innerHTML = ''; 
      orderList.appendChild(initialState);
      orderList.appendChild(loadingState);
      orderList.appendChild(emptyState);
      
      try {
        const response = await fetch(`${API_URL}?user=${encodeURIComponent(username)}`, {
          method: 'GET'
        });
        
        const data = await response.json();
        
        loadingState.classList.add('hidden');
        
        // 核心修改1：根据实际接口返回的 JSON 结构进行判断 (code === 200 并且 data 存在)
        if (data.code === 200 && data.data) {
          // 确保 orders 是一个数组
          const orders = Array.isArray(data.data) ? data.data : [data.data];
          
          if (orders.length > 0) {
            renderOrders(orders);
            resultCount.textContent = `为您匹配到 ${orders.length} 条记录`;
            showToast(data.msg || '查询成功，已获取最新进度', 'success'); // 核心修改2：提示信息取 data.msg
          } else {
            emptyState.classList.remove('hidden');
            resultCount.textContent = `0 条记录`;
            showToast('暂无记录，请检查账号是否输入正确', 'info');
          }
        } else {
          emptyState.classList.remove('hidden');
          resultCount.textContent = `0 条记录`;
          showToast(data.msg || '未查询到数据或系统繁忙', 'error');
        }
      } catch (error) {
        loadingState.classList.add('hidden');
        emptyState.classList.remove('hidden');
        resultCount.textContent = `0 条记录`;
        showToast('网络连接异常或接口解析失败', 'error');
      }
    });
    
    function renderOrders(orders) {
      initialState.classList.add('hidden');
      loadingState.classList.add('hidden');
      emptyState.classList.add('hidden');
      
      orders.forEach(order => {
        const orderItem = document.createElement('div');
        orderItem.className = 'border border-dark-700 rounded-xl p-4 transition-custom hover:shadow-md bg-dark-750';
        
        const formatValue = (value) => value || '暂无数据';
        
        const getStatusClass = (status) => {
          switch(status) {
            case '进行中': return 'bg-blue-900/50 text-blue-300';
            case '已完成': return 'bg-green-900/50 text-green-300';
            case '未开始': return 'bg-yellow-900/50 text-yellow-300';
            case '已取消': return 'bg-gray-700 text-gray-400';
            default: return 'bg-purple-900/50 text-purple-300';
          }
        };
        
        // 核心修改3：字段名映射与接口数据完全对齐 (id, user, process 等)
        orderItem.innerHTML = `
          <div class="flex flex-wrap justify-between items-start mb-4 gap-2">
            <h4 class="font-semibold text-white text-lg">进度ID: ${formatValue(order.id)}</h4>
            <span class="px-2 py-1 rounded text-xs font-medium ${getStatusClass(order.status)}">
              ${formatValue(order.status)}
            </span>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 text-sm">
            <div class="bg-dark-700 p-3 rounded-lg">
              <div class="text-gray-400 mb-1 flex items-center">
                <span class="mr-2 text-primary">📚</span>
                <span>平台名称</span>
              </div>
              <div class="font-medium text-white">${formatValue(order.ptname)}</div>
            </div>
            
            <div class="bg-dark-700 p-3 rounded-lg">
              <div class="text-gray-400 mb-1 flex items-center">
                <span class="mr-2 text-primary">🏫</span>
                <span>学校</span>
              </div>
              <div class="font-medium text-white">${formatValue(order.school)}</div>
            </div>
            
            <div class="bg-dark-700 p-3 rounded-lg col-span-1 md:col-span-2">
              <div class="text-gray-400 mb-1 flex items-center">
                <span class="mr-2 text-primary">👤</span>
                <span>账号</span>
              </div>
              <div class="font-medium text-white break-all">${formatValue(order.user)}</div>
            </div>
          </div>
          
          <div class="mb-4">
            <div class="text-gray-400 mb-1 flex items-center">
              <span class="mr-2 text-primary">📋</span>
              <span>课程名称</span>
            </div>
            <div class="font-medium text-white">${formatValue(order.kcname)}</div>
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 mb-4 text-sm">
            <div>
              <div class="text-gray-400 mb-1">下单时间</div>
              <div class="font-medium text-white">${formatValue(order.addtime)}</div>
            </div>
            <div>
              <div class="text-gray-400 mb-1">课程状态</div>
              <div class="font-medium text-white">${formatValue(order.status)}</div>
            </div>
            <div>
              <div class="text-gray-400 mb-1">完成进度</div>
              <div class="font-medium text-primary">${formatValue(order.process)}</div>
            </div>
          </div>
          
          <div class="border-t border-dark-700 pt-3">
            <div class="text-gray-400 mb-1 flex items-center">
              <span class="mr-2 text-primary">📊</span>
              <span>学习详情</span>
            </div>
            <div class="font-medium text-sm text-gray-300 break-words whitespace-pre-wrap">${formatValue(order.remarks)}</div>
          </div>
        `;
        
        orderList.appendChild(orderItem);
      });
    }
    
    function showToast(message, type = 'info') {
      toastMessage.textContent = message;
      
      switch(type) {
        case 'success': toastIcon.textContent = '✅'; break;
        case 'error': toastIcon.textContent = '❌'; break;
        case 'warning': toastIcon.textContent = '⚠️'; break;
        default: toastIcon.textContent = 'ℹ️';
      }
      
      toast.classList.remove('translate-x-full');
      setTimeout(() => { toast.classList.add('translate-x-full'); }, 3000);
    }
  </script>
</body>
</html>
